<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRID</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">GR<span class="accent">ID</span></div>
            <div class="nav-links">
                <a href="#home" data-target="home" class="nav-link active">HOME</a>
                <a href="#auth" data-target="auth" class="nav-link">ACCESS</a>
                <a href="#about" data-target="about" class="nav-link">GAME</a>
            </div>
        </div>
    </nav>

    <main>
        <section id="home" class="page active">
            <div class="hero">
                <h1 class="glitch-title">WELCOME TO THE GRID</h1>
                <button id="btnOpenAuth" class="submit-btn">START CONNECTION</button>
            </div>
            <div class="device-container">
                <div class="device">
                    <div class="speaker"></div>
                    <div class="side-btn btn1"></div>
                    <div class="side-btn btn2"></div>
                    <div class="side-btn btn3"></div>
                    <div class="screen">
                        <div class="screen-content">
                            <div class="screen-status">NEURAL LINK ONLINE</div>
                            <div class="screen-logo">◉</div>
                            <div class="screen-version">GRID v0.8.4</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="auth" class="page">
            <div class="auth-container">
                <form id="authForm" class="auth-card">
                    <div class="auth-header">
                        <div class="auth-header-title">GRID-Play</div>
                    </div>
                    <div class="tab-row">
                        <button type="button" id="tab-login" class="tab active">LOGIN</button>
                        <button type="button" id="tab-signup" class="tab">SIGN UP</button>
                    </div>
                    <div class="auth-body">
                        <div class="form-group">
                            <label class="form-label-primary" for="username">USERNAME</label>
                            <input type="text" id="username" required class="form-input">
                            
                        </div>
                        <div id="emailGroup" class="form-group auth-hidden">
                            <label class="form-label-primary" for="email">EMAIL</label>
                            <input type="email" id="email" class="form-input">
                    
                        </div>
                        <div class="form-group">
                            <label class="form-label-primary" for="password">ACCESS KEY</label>
                            <input type="password" id="password" required class="form-input">
                            
                        </div>
                        <div id="confirmGroup" class="form-group auth-hidden">
                            <label class="form-label-primary" for="confirmPassword">CONFIRM</label>
                            <input type="password" id="confirmPassword" class="form-input">
                            
                        </div>
                        <button type="submit" class="submit-btn full-width-btn">INITIATE_CONNECTION</button>
                    </div>
                </form>
                <div id="successScreen" class="success-container">
                    <h2 id="successTitle" class="success-heading">CONNECTION ESTABLISHED</h2>
                    <button id="btnPlay" class="play-button" type="button">
                        PLAY
                        <div id="clip">
                            <div class="corner" id="leftTop"></div>
                            <div class="corner" id="rightBottom"></div>
                            <div class="corner" id="rightTop"></div>
                            <div class="corner" id="leftBottom"></div>
                        </div>
                        <span id="rightArrow" class="arrow"></span>
                        <span id="leftArrow" class="arrow"></span>
                    </button>
                    <button id="btnBack" class="back-btn" type="button">BACK</button>
                </div>
            </div>
        </section>

        <section id="game" class="page">
            <div class="game-header">
                <h2 id="score">SCORE: 0000</h2>
                <button id="btnExit" class="submit-btn exit-btn" type="button">EXIT</button>
            </div>
            <canvas id="matrixCanvas" width="800" height="500"></canvas>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
